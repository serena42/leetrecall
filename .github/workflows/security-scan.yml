name: Security Scan
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write  # ADDED: Required for SARIF uploads

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ========== ISSUE #1: Scorecard API throttling ==========
      # BEFORE: Downloaded binary directly, risked rate limits
      # AFTER: Use official action
      - name: Run Scorecard
        uses: ossf/scorecard-action@main
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # publish_results: false  # Uncomment if you want to publish to scorecard.dev

      # ========== ISSUE #2: Semgrep output not in SARIF format ==========
      # BEFORE: Ran with --json, results not visible in GitHub Security tab
      # AFTER: Use official Semgrep action which outputs SARIF natively
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
          args: --sarif --output=semgrep.sarif
          # Optional: uncomment to fail on findings
          # args: --sarif --output=semgrep.sarif --error

      # ========== ISSUE #3: Missing secret scanning ==========
      # NEW: Added TruffleHog for hardcoded secrets/API keys
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          # On private repos, you may want:
          # extra_args: --debug

      # ========== ISSUE #4: npm audit silently fails ==========
      # BEFORE: || true masked all errors
      # AFTER: Use npm ci (exact versions), fail on moderate+ vulns
      - name: Install dependencies
        run: npm ci
        # npm ci uses package-lock.json for exact versions
        # Fails fast if lock file is out of sync

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        # Fails the build if moderate or higher severity found
        # Remove --audit-level to report but not fail

      # ========== ISSUE #5: Retire.js no longer needed ==========
      # REMOVED: npm audit covers the same ground now
      # Retire.js is unmaintained; npm audit + Semgrep are sufficient

      # ========== ISSUE #6: Results visibility ==========
      # NEW: Upload all SARIF files to GitHub Code Scanning dashboard
      # This makes vulnerabilities visible in PR checks and Security tab
      - name: Upload SARIF Results to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()  # Run even if previous steps fail
        with:
          sarif_file: .
          # Scans current directory for all .sarif files
          category: security-scan

      # ========== OPTIONAL: Generate summary ==========
      # NEW: Create a readable summary in GitHub Actions UI
      - name: Security Scan Summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Scorecard: Results in artifacts" >> $GITHUB_STEP_SUMMARY
          echo "✅ Semgrep: Code pattern scanning" >> $GITHUB_STEP_SUMMARY
          echo "✅ TruffleHog: Secret scanning" >> $GITHUB_STEP_SUMMARY
          echo "✅ npm audit: Dependency scanning" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 See detailed results in the **Security** tab of this repository." >> $GITHUB_STEP_SUMMARY
