<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetRecall</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h2>LeetRecall</h2>
    <span id="due-count" class="badge">0 due</span>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab active" data-tab="due">Due Today</button>
    <button class="tab" data-tab="all">All Problems</button>
  </div>

  <!-- Problem list -->
  <div id="content">
    <p class="loading">Loading...</p>
  </div>

  <!-- Footer with dashboard link -->
  <div class="footer">
    <button id="open-dashboard">View All Problems</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
